name: Build IPA

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '13.4.1' # specify the required Xcode version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7' # specify the required Ruby version

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          bundle exec pod install

      - name: Build and archive the project
        run: |
          xcodebuild -workspace appdb.xcworkspace \
                      -scheme appdb \
                      -sdk iphoneos \
                      -configuration Release \
                      -archivePath $PWD/build/appdb.xcarchive \
                      clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                      -archivePath $PWD/build/appdb.xcarchive \
                      -exportPath $PWD/build \
                      -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v2
        with:
          name: appdb-IPA
          path: build/appdb.ipa
